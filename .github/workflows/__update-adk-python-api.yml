name: Rigenera Python API Reference Docs da Script Google

on:
  workflow_dispatch: # Abilita il bottone manuale

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      # 1. Scarica la repository della documentazione (il tuo fork)
      - name: Checkout adk-docs
        uses: actions/checkout@v4
        with:
          path: adk-docs

      # 2. Scarica la repository del codice Python sorgente (Google originale)
      - name: Checkout adk-python
        uses: actions/checkout@v4
        with:
          repository: google/adk-python
          path: adk-python

      # 3. Configura Python sulla macchina virtuale
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Installa le dipendenze e la libreria Python in modalità modificabile
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd adk-docs
          pip install -r requirements.txt
          pip install -e ../adk-python

      # 5. Esegue il file generate.sh originale di Google + estrazione ultima versione
      - name: Run Google Generation Script
        run: |
          set -euo pipefail

          cd adk-docs

          # Recupera il tag usando il token di sicurezza interno della macchina virtuale
          RAW_VERSION=$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/google/adk-python/releases/latest \
            | jq -r '.tag_name // empty'
          )

          if [ -z "${RAW_VERSION}" ]; then
            echo "Errore: impossibile determinare l'ultimo tag di release da adk-python" >&2
            exit 1
          fi

          # Rimuove la 'v' iniziale se presente
          CLEAN_VERSION="${RAW_VERSION#v}"

          echo "Ultima versione rilevata automaticamente: $CLEAN_VERSION"

          chmod +x tools/python-api-docs/generate.sh
          bash tools/python-api-docs/generate.sh ../adk-python "$CLEAN_VERSION"



      # 6. Salva e pubblica i file Markdown rigenerati sul tuo branch main
      - name: Commit and Push updated files
        run: |
          cd adk-docs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff-index --quiet HEAD || git commit -m "docs: auto-generate python api documentation to v2.5"
          git push origin main
