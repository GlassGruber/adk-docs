name: Rigenera Python API Reference Docs da Script Google

on:
  workflow_dispatch:
    inputs:
      sync_upstream:
        description: 'Se true, recupera e allinea adk-docs dal repo upstream prima di generare'
        required: false
        default: 'false'
      upstream_repo:
        description: 'URL del repository upstream da cui sincronizzare'
        required: false
        default: 'https://github.com/google/adk-docs.git'
      upstream_branch:
        description: 'Branch upstream da cui prendere i contenuti'
        required: false
        default: 'main'
  workflow_call:
    inputs:
      sync_upstream:
        description: 'Se true, recupera e allinea adk-docs dal repo upstream prima di generare'
        required: false
        type: string
        default: 'false'
      upstream_repo:
        description: 'URL del repository upstream da cui sincronizzare'
        required: false
        type: string
        default: 'https://github.com/google/adk-docs.git'
      upstream_branch:
        description: 'Branch upstream da cui prendere i contenuti'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout adk-docs
        uses: actions/checkout@v4
        with:
          path: adk-docs
          fetch-depth: 0

      - name: Sync from upstream (optional)
        run: |
          set -euo pipefail

          # Determina gli input in base al trigger (workflow_call vs workflow_dispatch)
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            SYNC_INPUT="${{ inputs.sync_upstream }}";
            UPSTREAM_REPO="${{ inputs.upstream_repo }}";
            UPSTREAM_BRANCH="${{ inputs.upstream_branch }}";
          else
            SYNC_INPUT="${{ github.event.inputs.sync_upstream || 'false' }}";
            UPSTREAM_REPO="${{ github.event.inputs.upstream_repo || 'https://github.com/google/adk-docs.git' }}";
            UPSTREAM_BRANCH="${{ github.event.inputs.upstream_branch || 'main' }}";
          fi

          echo "sync input: $SYNC_INPUT"
          if [ "$SYNC_INPUT" = "true" ] || [ "$SYNC_INPUT" = "True" ] || [ "$SYNC_INPUT" = "1" ]; then
            echo "Sync requested: fetching from $UPSTREAM_REPO $UPSTREAM_BRANCH"
            cd adk-docs
            git remote remove upstream >/dev/null 2>&1 || true
            git remote add upstream "$UPSTREAM_REPO"
            git fetch upstream --tags --prune
            git reset --hard "upstream/$UPSTREAM_BRANCH"
            echo "Synced adk-docs from upstream/$UPSTREAM_BRANCH"
          else
            echo "No upstream sync requested. Continuing with current repo state."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd adk-docs
          pip install -r requirements.txt
          pip install uv

      - name: Run Google Generation Script
        run: |
          set -euo pipefail
          cd adk-docs

          RAW_VERSION=$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/google/adk-python/releases/latest \
            | jq -r '.tag_name // empty'
          )

          if [ -z "${RAW_VERSION}" ]; then
            echo "Errore: impossibile determinare l'ultimo tag di release da adk-python" >&2
            exit 1
          fi

          CLEAN_VERSION="${RAW_VERSION#v}"
          echo "Ultima versione rilevata automaticamente: $CLEAN_VERSION"

          chmod +x tools/python-api-docs/generate.sh
          bash tools/python-api-docs/generate.sh "$CLEAN_VERSION"

      - name: Commit and Push updated files
        run: |
          cd adk-docs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff-index --quiet HEAD || git commit -m "docs: auto-generate python api documentation"
          git push origin main
